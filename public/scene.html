<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>3D 粒子梦幻之旅 - 终极手势互动版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030308; font-family: sans-serif; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffd700; font-size: 16px; letter-spacing: 2px; z-index: 10; text-align: center;
        }
        #matrixCanvas {
            position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; 
            background-color: #030308; 
        }
        .input_video { display: none; }
        #camera-status {
            position: absolute; top: 20px; left: 20px; color: rgba(255, 20, 147, 0.8);
            font-size: 14px; z-index: 10; display: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="loading">
        正在为您烘焙 <span id="age-display">20</span> 岁生日蛋糕与回忆照片...<br>
        <span style="font-size: 12px; color: #888; margin-top: 10px; display: block;">*若需体验手势互动，请允许网页使用摄像头，并确保在本地服务器环境运行*</span>
    </div>
    
    <div id="camera-status">📷 摄像头追踪已激活 - 挥动手掌拨动旋转，停住张开手掌放大，握紧手掌还原</div>
    <video class="input_video" autoplay playsinline></video>
    <canvas id="matrixCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ==========================================
        // 第一部分：Happy Birthday 代码雨 (保持原样)
        // ==========================================
        const mCanvas = document.getElementById('matrixCanvas');
        const mCtx = mCanvas.getContext('2d');
        let mWidth = window.innerWidth;
        let mHeight = window.innerHeight;
        mCanvas.width = mWidth;
        mCanvas.height = mHeight;

        const str = "HAPPYBIRTHDAY";
        const letters = str.split("");
        const fontSize = 30; 
        let columns = Math.floor(mWidth / 10); 
        let drops = [];
        
        for(let x = 0; x < columns; x++) {
            drops[x] = Math.floor(Math.random() * -100); 
        }

        function drawMatrix() {
            mCtx.fillStyle = "rgba(3, 3, 8, 0.1)"; 
            mCtx.fillRect(0, 0, mWidth, mHeight);
            mCtx.font = "bold " + fontSize + "px 'Courier New', monospace";
            
            for(let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                const x = i * 10;
                const y = drops[i] * fontSize; 
                mCtx.fillStyle = "#ff1493"; 
                mCtx.fillText(text, x, y);
                if(y > mHeight && Math.random() > 0.95) drops[i] = 0;
                drops[i]++; 
            }
        }
        
        const matrixInterval = setInterval(drawMatrix, 60);

        gsap.to('#matrixCanvas', {
            opacity: 0, duration: 2.5, delay: 7.5, 
            onComplete: () => {
                clearInterval(matrixInterval);
                mCanvas.style.display = 'none';
                document.getElementById('camera-status').style.display = 'block';
            }
        });

        window.addEventListener('resize', () => {
            mWidth = window.innerWidth; mHeight = window.innerHeight;
            mCanvas.width = mWidth; mCanvas.height = mHeight;
        });

        // ==========================================
        // 第二部分：3D 蛋糕与爱心代码 (蛋糕等比放大 + 粒子大增)
        // ==========================================
        // 【修改 1】：提升 50% 的粒子数量，让蛋糕和爱心更加饱满
        const P_COUNT = 60000; 
        const MAIN_COUNT = 45000; 
        const BG_COUNT = 15000;   
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 24); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);

        const photoGroup = new THREE.Group();
        scene.add(photoGroup);
        const photoMaterials = []; const photos = [];         
        const textureLoader = new THREE.TextureLoader();
        textureLoader.setCrossOrigin('anonymous'); 

        // Read user photos from URL params, fallback to picsum
        const urlParams = new URLSearchParams(window.location.search);
        const ageParam = urlParams.get('age') || '18';
        if (ageParam) {
          const ageEl = document.getElementById('age-display');
          if (ageEl) ageEl.textContent = ageParam;
        }

        // ── 离屏文本采样器：将 age 字符串渲染为像素点集 ──
        const ageStr = String(ageParam).slice(0, 3);
        const dynamicTextPoints = [];
        (function buildTextPoints() {
            const cv = document.createElement('canvas');
            cv.width = 100; cv.height = 100;
            const ctx = cv.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 100, 100);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ageStr, 50, 52);
            const imgData = ctx.getImageData(0, 0, 100, 100).data;
            for (let py = 0; py < 100; py++) {
                for (let px = 0; px < 100; px++) {
                    if (imgData[(py * 100 + px) * 4 + 3] > 128) {
                        dynamicTextPoints.push({
                            x: (px - 50) / 50,
                            y: -(py - 50) / 50
                        });
                    }
                }
            }
        })();

        const userPhotos = urlParams.get('photos');
        let imageUrls = [];
        if (userPhotos) {
          imageUrls = userPhotos.split(',').filter(Boolean);
        }
        if (imageUrls.length === 0) {
          for(let i = 0; i < 18; i++) imageUrls.push(`https://picsum.photos/seed/${i + 20}/300/400`);
        }
        const PHOTO_COUNT = imageUrls.length;

        for(let i = 0; i < PHOTO_COUNT; i++) {
            const glowGeo = new THREE.PlaneGeometry(2.1, 3.1);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthWrite: false });
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            photoMaterials.push({ mat: glowMat, targetOp: 0.15 }); 

            const texture = textureLoader.load(imageUrls[i]);
            const imgGeo = new THREE.PlaneGeometry(2.0, 3.0);
            const imgMatFront = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0, depthWrite: false });
            const imgMeshFront = new THREE.Mesh(imgGeo, imgMatFront);
            imgMeshFront.position.z = 0.01;
            photoMaterials.push({ mat: imgMatFront, targetOp: 0.80 });

            const imgMatBack = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0, depthWrite: false });
            const imgMeshBack = new THREE.Mesh(imgGeo, imgMatBack);
            imgMeshBack.position.z = -0.01; imgMeshBack.rotation.y = Math.PI; 
            photoMaterials.push({ mat: imgMatBack, targetOp: 0.80 });

            const singlePhoto = new THREE.Group();
            singlePhoto.add(glowMesh); singlePhoto.add(imgMeshFront); singlePhoto.add(imgMeshBack);

            const phi = Math.acos(1 - 2 * (i + 0.5) / PHOTO_COUNT);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;
            const noisyPhi = phi + (Math.random() - 0.5) * 0.6;
            const noisyTheta = theta + (Math.random() - 0.5) * 0.6;
            const r = 8.5 + Math.random() * 3.5; 

            singlePhoto.position.x = r * Math.sin(noisyPhi) * Math.cos(noisyTheta);
            singlePhoto.position.y = r * Math.sin(noisyPhi) * Math.sin(noisyTheta) + 1; 
            singlePhoto.position.z = r * Math.cos(noisyPhi);
            singlePhoto.lookAt(singlePhoto.position.x * 2, singlePhoto.position.y * 2, singlePhoto.position.z * 2);
            singlePhoto.userData.randomOffset = Math.random() * Math.PI * 2;
            
            singlePhoto.userData.originPos = new THREE.Vector3().copy(singlePhoto.position);
            singlePhoto.userData.originRot = new THREE.Euler().copy(singlePhoto.rotation);

            photoGroup.add(singlePhoto); photos.push(singlePhoto);
        }

        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(P_COUNT * 3); const colors = new Float32Array(P_COUNT * 3); 
        const cakeData = []; const colorCake = []; const heartData = []; const colorHeart = [];
        const bgDirs = new Float32Array(BG_COUNT * 3);

        function addColor(arr, hex) {
            const c = new THREE.Color(hex); arr.push(c.r, c.g, c.b);
        }

        for(let i = 0; i < P_COUNT; i++) {
            const isBg = i >= MAIN_COUNT; const bgIdx = (i - MAIN_COUNT) * 3;
            if(isBg) {
                cakeData.push((Math.random()-0.5)*45, (Math.random()-0.5)*45, (Math.random()-0.5)*45); addColor(colorCake, 0x332244); 
            } else {
                const cakePart = Math.random(); 
                const angC = Math.random() * Math.PI * 2; 
                const dist = Math.sqrt(Math.random()); 
                let xC, yC, zC, cHex;

                if (cakePart > 0.93) { 
                    // 50% 粒子用来画 2，50% 用来画 0
                    const isTwo = Math.random() > 0.5; 
                    const noiseX = (Math.random() - 0.5) * 0.3;
                    const noiseY = (Math.random() - 0.5) * 0.3;
                    const noiseZ = (Math.random() - 0.5) * 0.3;
                    const zOffset = 1.2; 
                    
                    if (isTwo) { 
                        const part2 = Math.random();
                        if (part2 < 0.4) {
                            const theta = Math.random() * Math.PI * 1.2 - Math.PI * 0.2;
                            xC = -1.0 + Math.cos(theta) * 0.6 + noiseX;
                            yC = 4.2 + Math.sin(theta) * 0.6 + noiseY;
                        } else if (part2 < 0.7) {
                            const t = Math.random();
                            xC = -0.52 - t * 1.08 + noiseX;
                            yC = 3.85 - t * 1.35 + noiseY;
                        } else {
                            const t = Math.random();
                            xC = -1.6 + t * 1.2 + noiseX;
                            yC = 2.5 + noiseY;
                        }
                        zC = zOffset + noiseZ;
                    } else {
                        const angle = Math.random() * Math.PI * 2; 
                        xC = 1.0 + Math.cos(angle) * 0.6 + noiseX; 
                        yC = 3.65 + Math.sin(angle) * 1.15 + noiseY; 
                        zC = zOffset + noiseZ;
                    }
                    cHex = 0xffd700; 
                } else if (cakePart > 0.88) {
                    const rC = dist * 0.35; yC = 1.5 + Math.random() * 2.5; xC = Math.cos(angC) * rC; zC = Math.sin(angC) * rC; cHex = 0xff2222;
                } else if (cakePart > 0.5) { 
                    const rC = dist * 5.5; yC = -3.5 + Math.random() * 2.0; xC = Math.cos(angC) * rC; zC = Math.sin(angC) * rC; cHex = 0x4488ff; 
                } else if (cakePart > 0.2) { 
                    const rC = dist * 4.0; yC = -1.5 + Math.random() * 2.0; xC = Math.cos(angC) * rC; zC = Math.sin(angC) * rC; cHex = 0xff88bb;
                } else { 
                    const rC = dist * 2.5; yC = 0.5 + Math.random() * 1.5; xC = Math.cos(angC) * rC; zC = Math.sin(angC) * rC; cHex = 0xffdd44;
                } 
                
                // 完美的等比例放大逻辑
                const cakeScale = 1.4;
                cakeData.push(xC * cakeScale, yC * cakeScale, zC * cakeScale); 
                addColor(colorCake, cHex);
            }

            if(isBg) {
                const theta = Math.random() * Math.PI * 2; const phi = Math.acos((Math.random() * 2) - 1);
                const dx = Math.sin(phi) * Math.cos(theta); const dy = Math.sin(phi) * Math.sin(theta); const dz = Math.cos(phi);
                bgDirs[bgIdx] = dx; bgDirs[bgIdx+1] = dy; bgDirs[bgIdx+2] = dz;
                const initDist = Math.random() * 15;
                heartData.push(dx * initDist, dy * initDist + 0.5, dz * initDist); addColor(colorHeart, Math.random() > 0.5 ? 0xffb6c1 : 0xff1493); 
            } else {
                let xH, yH, zH;
                while(true) {
                    xH = (Math.random() - 0.5) * 3; yH = (Math.random() - 0.5) * 3; zH = (Math.random() - 0.5) * 3;
                    let a = xH*xH + 2.25*zH*zH + yH*yH - 1; let val = a*a*a - xH*xH*yH*yH*yH - 0.1125*zH*zH*yH*yH*yH;
                    if(val <= 0) break; 
                }
                heartData.push(xH * 6.5, yH * 6.5 + 1.0, zH * 6.5); addColor(colorHeart, 0xffb6c1); 
            }
            positions[i*3] = cakeData[i*3]; positions[i*3+1] = cakeData[i*3+1]; positions[i*3+2] = cakeData[i*3+2];
            colors[i*3] = colorCake[i*3]; colors[i*3+1] = colorCake[i*3+1]; colors[i*3+2] = colorCake[i*3+2];
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3)); geo.setAttribute('color', new THREE.BufferAttribute(colors, 3)); 
        const mat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending, depthWrite: false });
        const points = new THREE.Points(geo, mat); scene.add(points);
        document.getElementById('loading').style.display = 'none';

        let currentMode = 'cake'; let isMorphing = false; 
        function morphTo(targetPos, targetCol, mode) {
            isMorphing = true; currentMode = mode;
            gsap.to(positions, { endArray: targetPos, duration: 3.5, ease: "power2.inOut", onUpdate: () => geo.attributes.position.needsUpdate = true, onComplete: () => isMorphing = false });
            gsap.to(colors, { endArray: targetCol, duration: 3.5, ease: "power2.inOut", onUpdate: () => geo.attributes.color.needsUpdate = true });
        }

        const heartBeat = gsap.timeline({ repeat: -1, paused: true });
        heartBeat.to(points.scale, { x: 1.1, y: 1.1, z: 1.1, duration: 0.15, ease: "power1.out" })   
                 .to(points.scale, { x: 1.0, y: 1.0, z: 1.0, duration: 0.25, ease: "power1.in" })
                 .to(points.scale, { x: 1.08, y: 1.08, z: 1.08, duration: 0.15, ease: "power1.out" })     
                 .to(points.scale, { x: 1.0, y: 1.0, z: 1.0, duration: 1.2, ease: "power1.in" });

        gsap.delayedCall(14.0, () => {
            morphTo(heartData, colorHeart, 'heart');
            photoMaterials.forEach(item => gsap.to(item.mat, { opacity: item.targetOp, duration: 3.5, ease: "power2.inOut" }));
            setTimeout(() => heartBeat.restart(), 3000); 
        });


        // ==========================================
        // 第三部分：抗闪烁与防误触升级版手势追踪
        // ==========================================
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        let mousePanX = 0; let mousePanY = 0; 
        let handRotX = 0;  let handRotY = 0;  

        document.addEventListener('mousemove', (e) => {
            mousePanX = (e.clientX - windowHalfX) / windowHalfX; 
            mousePanY = (e.clientY - windowHalfY) / windowHalfY; 
        });

        const videoElement = document.getElementsByClassName('input_video')[0];
        let activePhoto = null; 
        let isZoomedIn = false;     
        let isAnimatingPhoto = false; 

        // 【修改 3】：加入帧缓冲计数器，彻底解决单帧识别抖动误触
        let openCounter = 0;
        let closedCounter = 0;
        let stableHandState = 'UNKNOWN'; 
        let prevStableHandState = 'UNKNOWN';

        let previousHandX = null;
        let previousHandY = null;

        function getDistance(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // --- 1. 高级开合状态识别 (带防抖过滤) ---
                const palmLength = getDistance(landmarks[0], landmarks[9]);
                const tipsDist = (
                    getDistance(landmarks[0], landmarks[8]) + 
                    getDistance(landmarks[0], landmarks[12]) + 
                    getDistance(landmarks[0], landmarks[16]) + 
                    getDistance(landmarks[0], landmarks[20])
                ) / 4;

                const openRatio = tipsDist / palmLength;
                
                // 适当放宽了识别阈值，让动作更容易做出来
                if (openRatio > 1.75) {
                    openCounter++; closedCounter = 0;
                } else if (openRatio < 1.35) {
                    closedCounter++; openCounter = 0;
                } else {
                    openCounter = Math.max(0, openCounter - 1);
                    closedCounter = Math.max(0, closedCounter - 1);
                }

                // 必须连续稳定 4 帧（约 0.1 秒）才确认手势，避免手势一闪而过导致乱飞
                if (openCounter >= 4) stableHandState = 'OPEN';
                if (closedCounter >= 4) stableHandState = 'CLOSED';

                // --- 2. 拨动位移与速度检测 ---
                const trackingPoint = landmarks[9];
                let handSpeed = 0; // 记录手滑动的瞬时速度
                
                if (previousHandX !== null && previousHandY !== null) {
                    const deltaX = trackingPoint.x - previousHandX;
                    const deltaY = trackingPoint.y - previousHandY;
                    handSpeed = Math.hypot(deltaX, deltaY);

                    // 只有未放大照片时，拨动才带动整体旋转
                    if (!isZoomedIn) {
                        handRotY -= deltaX * 4.0; 
                        handRotX += deltaY * 6.0; 
                        handRotX = Math.max(-Math.PI/4, Math.min(Math.PI/4, handRotX));
                    }
                }
                previousHandX = trackingPoint.x;
                previousHandY = trackingPoint.y;

                // --- 3. 触发放大/缩小动画 ---
                if (currentMode === 'heart' && !isAnimatingPhoto) {
                    
                    // 【触发放大】：从紧握变张开，且当前没放大照片
                    if (prevStableHandState === 'CLOSED' && stableHandState === 'OPEN' && activePhoto === null) {
                        
                        // 【核心拦截】：如果是手正在快速滑动（扇耳光），哪怕手张开了也不触发放大！
                        // 必须是相对停下来做这个手势，才能生效。
                        if (handSpeed < 0.04) {
                            let closestPhotoGroup = null;
                            let minDistance = Infinity;
                            const tempWorldPos = new THREE.Vector3();

                            // 永远只放大离镜头物理距离绝对最近的相片，百分百解决抓错背后照片的问题
                            photos.forEach(photo => {
                                photo.getWorldPosition(tempWorldPos);
                                const dist = tempWorldPos.distanceTo(camera.position);
                                if(dist < minDistance) {
                                    minDistance = dist;
                                    closestPhotoGroup = photo;
                                }
                            });

                            if (closestPhotoGroup) {
                                activePhoto = closestPhotoGroup;
                                isAnimatingPhoto = true;
                                isZoomedIn = true;

                                scene.attach(activePhoto);
                                gsap.to(activePhoto.position, { x: 0, y: 3, z: 18, duration: 1.2, ease: "power2.out" });
                                gsap.to(activePhoto.rotation, { x: 0, y: 0, z: 0, duration: 1.2, ease: "power2.out", onComplete: () => isAnimatingPhoto = false });
                                activePhoto.children.forEach((mesh, index) => {
                                // index === 0 是发光外框，设为 0.3
                                // 其他（照片本体）设为 1.0 (完全清晰)。如果你想放大后依旧带点透明，可以改成 0.9 或 0.8
                                let targetOp = (index === 0) ? 0.3 : 0.8; 
                                gsap.to(mesh.material, { opacity: targetOp, duration: 1.2, ease: "power2.out" });
                            });
                            }
                        }
                    }

                    // 【触发缩小】：从张开变紧握，且当前有照片被放大
                    else if (prevStableHandState === 'OPEN' && stableHandState === 'CLOSED' && activePhoto !== null) {
                        isAnimatingPhoto = true;
                        photoGroup.attach(activePhoto);

                        gsap.to(activePhoto.position, { x: activePhoto.userData.originPos.x, y: activePhoto.userData.originPos.y, z: activePhoto.userData.originPos.z, duration: 1.2, ease: "power2.inOut" });
                        gsap.to(activePhoto.rotation, { x: activePhoto.userData.originRot.x, y: activePhoto.userData.originRot.y, z: activePhoto.userData.originRot.z, duration: 1.2, ease: "power2.inOut",
                            onComplete: () => { activePhoto = null; isZoomedIn = false; isAnimatingPhoto = false; }
                        });
                    }
                }
                
                // 记录状态用于下一帧对比
                if (stableHandState !== 'UNKNOWN') {
                    prevStableHandState = stableHandState;
                }

            } else {
                // 手移出屏幕，不清空防抖计数，防止重新进入时画面抖动
                previousHandX = null;
                previousHandY = null;
            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
        cameraFeed.start();

        // ==========================================
        // 第四部分：Three.js 核心动画循环 
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            if (currentMode === 'heart' && !isMorphing) {
                const pulseIntensity = Math.max(0, points.scale.x - 1.0); 
                const speed = 0.03 + pulseIntensity * 0.8; 

                for(let i = MAIN_COUNT; i < P_COUNT; i++) {
                    const idx = i * 3; const bgIdx = (i - MAIN_COUNT) * 3;
                    positions[idx] += bgDirs[bgIdx] * speed; positions[idx+1] += bgDirs[bgIdx+1] * speed; positions[idx+2] += bgDirs[bgIdx+2] * speed;
                    const distSq = positions[idx]**2 + (positions[idx+1]-0.5)**2 + positions[idx+2]**2;
                    if (distSq > 300) { 
                        positions[idx] = bgDirs[bgIdx] * 1.5; positions[idx+1] = bgDirs[bgIdx+1] * 1.5 + 0.5; positions[idx+2] = bgDirs[bgIdx+2] * 1.5;
                    }
                }
                geo.attributes.position.needsUpdate = true;
            }

            photoGroup.scale.copy(points.scale);

            // 完美融合：鼠标偏移 + 手势拨动
            handRotY += 0.002; 
            const targetRotY = handRotY + (mousePanX * Math.PI); 
            const targetRotX = handRotX + (mousePanY * (Math.PI / 4));

            points.rotation.y += (targetRotY - points.rotation.y) * 0.15;
            points.rotation.x += (targetRotX - points.rotation.x) * 0.15;

            photoGroup.rotation.y += (targetRotY - photoGroup.rotation.y) * 0.15;
            photoGroup.rotation.x += (targetRotX - photoGroup.rotation.x) * 0.15;

            photos.forEach(photo => {
                if (photo !== activePhoto) {
                    photo.position.y += Math.sin(time * 1.5 + photo.userData.randomOffset) * 0.002;
                }
            });
            
            camera.lookAt(0,0,0);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            windowHalfX = window.innerWidth / 2; windowHalfY = window.innerHeight / 2;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
