<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进阶版 - 柔和流光爱心全景特效</title>
    <style>
        /* 干净通透的微渐变背景 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            user-select: none;
        }

        /* 3D 舞台容器 */
        #stage {
            width: 100%;
            height: 100%;
            position: relative;
            perspective: 1800px; /* 进一步加深透视，让飞出感更强 */
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 中心的文字 */
        #center-text {
            position: absolute;
            font-size: 36px;
            font-weight: 900;
            color: #ff5277;
            letter-spacing: 4px;
            opacity: 0;
            /* 初始状态：缩小且在常规层级 */
            transform: translate3d(0, -15px, 0) scale(0.5);
            transition: all 2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            text-shadow: 0 4px 15px rgba(255, 82, 119, 0.4);
            pointer-events: none;
        }

        /* 渐变文字框基础样式 */
        .msg {
            position: absolute;
            padding: 8px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            opacity: 0;
            transform-origin: center center;
            /* 开启硬件加速，保证慢动作不卡顿 */
            will-change: transform, opacity; 
        }

        .msg .text {
            position: relative;
            z-index: 2;
            transition: opacity 1.5s ease;
        }

        /* 使用安全的 Unicode 字符生成暗纹小爱心 */
        .msg::after {
            content: "\2665"; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: rgba(255, 255, 255, 0); 
            transition: color 2s ease;
            z-index: 1;
        }

        .msg.locked .text {
            opacity: 0;
        }
        .msg.locked::after {
            color: rgba(255, 255, 255, 0.35); 
        }
        .msg.locked {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
        }
    </style>
</head>
<body>

    <div id="stage">
        <!-- 使用安全的 HTML 实体 &hearts; -->
        <div id="center-text">for you &hearts;</div>
    </div>

    <script>
        const TOTAL = 260; // 进一步增加数量，填充大爱心
        const stage = document.getElementById('stage');
        const centerText = document.getElementById('center-text');
        
        const phrases = [
    // 真诚的夸奖 (新增)
    "你闪闪发光", "是个可爱的人间宝藏", "你的笑容能治愈一切", "每天都在变优秀",
    "灵魂有趣又自由", "怎么会有这么好的人", "执行力满分", "品味真的很好",
    "自带阳光属性", "总能带给人温暖", "你的想法总是很酷", "你认真的样子最迷人",

    // 温柔与治愈
    "愿你每天开心", "世界因你柔软", "好好生活慢慢相遇", "前路浩浩荡荡",
    "万事皆可期待", "保持心里的光", "平安喜乐", "晚风也温柔了",
    "想和你去看海", "星光都为你闪", "遇见你是件幸运的事", "风都是甜的",

    // 诗意与美好
    "想成为你的例外", "一瞬也是永恒", "你眼里有星星", "你是人间奇迹",
    "宇宙都在偏爱你", "目光所及皆是你", "万物不及你", "所念皆星河",
    "春风十里不如你", "你是无意穿堂风", "陪你碎碎念念", "伴你岁岁年年",
];

        const gradients = [
            "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)",
            "linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)",
            "linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)",
            "linear-gradient(135deg, #f6d365 0%, #fda085 100%)",
            "linear-gradient(135deg, #c471ed 0%, #f64f59 100%)",
            "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
            "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
            "linear-gradient(135deg, #fa709a 0%, #fee140 100%)"
        ];

        let elements = [];

        function getHeartPoint(t, scale) {
            let x = scale * (16 * Math.pow(Math.sin(t), 3));
            let y = -scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x, y };
        }

        function getHeartAngle(t, scale) {
            let p1 = getHeartPoint(t, scale);
            let p2 = getHeartPoint(t + 0.01, scale);
            return Math.atan2(p2.y - p1.y, p2.x - p1.x) * (180 / Math.PI);
        }

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function spawnElement(index) {
            let el = document.createElement('div');
            el.className = 'msg';
            let textSpan = document.createElement('span');
            textSpan.className = 'text';
            textSpan.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            el.appendChild(textSpan);
            el.style.background = gradients[Math.floor(Math.random() * gradients.length)];
            
            stage.appendChild(el);
            elements.push(el);

            // 在极远处生成
            let startX = (Math.random() - 0.5) * window.innerWidth * 3;
            let startY = (Math.random() - 0.5) * window.innerHeight * 3;
            let startZ = -2000 - Math.random() * 1000;
            let startRot = Math.random() * 360;
            
            el.style.transform = `translate3d(${startX}px, ${startY}px, ${startZ}px) rotateZ(${startRot}deg)`;
            
            await wait(20);

            // 第一阶段：非常缓慢地飞入屏幕并悬浮
            let floatX = (Math.random() - 0.5) * window.innerWidth * 0.9;
            let floatY = (Math.random() - 0.5) * window.innerHeight * 0.9;
            let floatZ = Math.random() * 300 - 150;
            let floatRot = (Math.random() - 0.5) * 60; 

            // 延长飞入时间至 4 秒
            el.style.transition = `transform 3s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.5s ease`;
            el.style.opacity = 1;
            el.style.transform = `translate3d(${floatX}px, ${floatY}px, ${floatZ}px) rotateZ(${floatRot}deg) scale(1.1)`;
        }

        async function runTimeline() {
            // [0 - 10.4s] 更加缓慢的入场：每 40ms 飞入一个卡片
            for(let i = 0; i < TOTAL; i++) {
                spawnElement(i);
                await wait(30); 
            }

            // 等待所有卡片在空中悠闲地漂浮完毕
            await wait(2500); 

            // [15.0s - 19.0s] 优雅汇聚成大爱心
            elements.forEach((el, i) => {
                // 分成 4 层，并将基础放大比例提升到 18 起步，让中间极其空旷
                let layerIndex = i % 4; 
                let scaleBase = 18 + (layerIndex * 1.6); 
                
                let t = (i / TOTAL) * Math.PI * 2;
                let targetPos = getHeartPoint(t, scaleBase);
                let angle = getHeartAngle(t, scaleBase);

                // 加入轻微随机数，让卡片堆叠边缘更自然、蓬松
                let offsetX = (Math.random() - 0.5) * 14;
                let offsetY = (Math.random() - 0.5) * 14;
                
                let targetZ = (i % 8) * 12 - (layerIndex * 10); 

                // 极度丝滑的 4.5 秒移动
                el.style.transition = `transform 3s cubic-bezier(0.34, 1.56, 0.64, 1)`;
                el.style.transform = `translate3d(${targetPos.x + offsetX}px, ${targetPos.y + offsetY}px, ${targetZ}px) rotateZ(${angle}deg) scale(1)`;
            });

            // 等待成型
            await wait(3500);

            // [20.5s] 锁定暗纹，卡片文字消散
            elements.forEach(el => el.classList.add('locked'));
            
            // [21.5s] 中心文案浮现
            await wait(600);
            centerText.style.opacity = 1;
            // 赋予极高的 Z 轴深度 (300px)，彻底杜绝被边缘卡片遮挡
            centerText.style.transform = "translate3d(0, -15px, 300px) scale(1)";

            // [22.5s - 25.0s] 怦然心动（更轻柔的心跳节奏）
            await wait(800);
            stage.style.transition = "transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            stage.style.transform = "scale(1.06)";
            await wait(400);
            stage.style.transform = "scale(1)";
            await wait(600);
            stage.style.transform = "scale(1.08)";
            await wait(400);
            stage.style.transform = "scale(1)";

            // 留出充分的时间欣赏
            await wait(1500);

            // [29.0s - 35.0s] 完美谢幕：优雅地飞散出屏幕
            centerText.style.transition = "all 2s ease-in";
            centerText.style.opacity = 0;
            centerText.style.transform = "translate3d(0, -15px, 300px) scale(2.5)";

            elements.forEach((el, i) => {
                let delay = Math.random() * 1.4; // 拉长离场的时间差，不急不躁
                let outX = (Math.random() - 0.5) * window.innerWidth * 3;
                let outY = (Math.random() - 0.5) * window.innerHeight * 3;
                let outZ = 1200 + Math.random() * 1500; // 飞向远方
                let rotX = (Math.random() - 0.5) * 720;
                let rotY = (Math.random() - 0.5) * 720;

                // 4 秒的飞出过渡动画
                el.style.transition = `transform 3s cubic-bezier(0.55, 0.085, 0.68, 0.53) ${delay}s, opacity 0.5s ease-in ${delay + 1.5}s`;
                el.style.transform = `translate3d(${outX}px, ${outY}px, ${outZ}px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
                el.style.opacity = 0;
            });
        }

        window.onload = () => {
            setTimeout(runTimeline, 500);
        };
    </script>
</body>
</html>
